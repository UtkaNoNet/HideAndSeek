# ============================================================
#  Конфигурация HideAndSeek
#  Координаты хаба и карт задаются командами:
#  /sethub /setforest /setdesert /setswamp — не нужно править вручную.
# ============================================================

hub:
  set: false
  world: world
  x: 0.0
  y: 100.0
  z: 0.0

maps:
  forest:
    set: false
    name: "Лесной приют"
    world: world
    x: 100.0
    y: 70.0
    z: 100.0
  desert:
    set: false
    name: "Пепельные пески"
    world: world
    x: 500.0
    y: 65.0
    z: -200.0
  swamp:
    set: false
    name: "Плачущие топи"
    world: world
    x: -350.0
    y: 72.0
    z: 800.0

settings:
  min-players: 2
  vote-time-seconds: 15        # время на голосование за карту
  hiding-time-seconds: 60      # время на "спрятаться" перед началом поиска
  game-time-seconds: 420       # 7 минут основной игры
  end-time-seconds: 20         # время просмотра результатов после конца
  seeker-bow-power: 5
  seeker-arrows: 1
  hider-hearts: 1              # 1 сердечко = 2 HP у прячущихся

# Настройки погоды для карт:
# swamp: ночь и дождь
# desert: солнце в зените, без осадков
# forest: закат, без осадков

# Координаты спавна по умолчанию для новых игроков
# (используются, если хаб не настроен)
default-spawn:
  world: world
  x: -1997.0
  y: 107.0
  z: -1992.0

debug: false
